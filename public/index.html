<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bot Libros al Mayoreo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid #ddd;padding:12px 24px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:500}
.status-dot{width:9px;height:9px;border-radius:50%;margin-left:auto;flex-shrink:0}
.dot-ok{background:#3B6D11}.dot-warn{background:#854F0B}.dot-err{background:#A32D2D}
.status-txt{font-size:13px;color:#666}
.main{max-width:900px;margin:0 auto;padding:1.5rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden}
.card-head{padding:10px 16px;border-bottom:0.5px solid #eee;font-size:13px;font-weight:500;color:#888;display:flex;align-items:center;gap:8px}
.card-body{padding:14px 16px}
.full{grid-column:1/-1}
/* QR */
.qr-wrap{text-align:center;padding:1rem}
.qr-wrap img{width:200px;height:200px;border-radius:8px;border:0.5px solid #ddd}
.qr-wrap p{font-size:13px;color:#666;margin-top:8px}
/* PENDIENTES */
.pendiente{border:0.5px solid #ddd;border-radius:8px;padding:12px 14px;margin-bottom:10px}
.pendiente:last-child{margin-bottom:0}
.p-nombre{font-size:14px;font-weight:500}
.p-meta{font-size:12px;color:#888;margin-top:2px}
.p-total{font-size:18px;font-weight:500;color:#3B6D11;margin:8px 0}
.p-select{width:100%;font-size:13px;padding:7px 10px;border:0.5px solid #ddd;border-radius:7px;background:#fafafa;outline:none;margin-bottom:8px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;border:none;transition:all .15s}
.btn-green{background:#25D366;color:#fff}.btn-green:hover{opacity:.9}
.btn-dark{background:#1a1a18;color:#fff}.btn-dark:hover{opacity:.85}
.btn-outline{background:transparent;color:#666;border:0.5px solid #ccc}.btn-outline:hover{background:#f0f0ee}
.btn-red{background:transparent;color:#A32D2D;border:0.5px solid #f0c0c0}.btn-red:hover{background:#fef0f0}
.btn-sm{padding:6px 12px;font-size:12px}
/* CUENTAS */
.cuenta-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #f0f0ee}
.cuenta-item:last-child{border-bottom:none}
.cuenta-banco{font-size:13px;font-weight:500}
.cuenta-clabe{font-size:12px;color:#888;font-family:monospace}
/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
input,select{width:100%;font-size:13px;padding:8px 11px;border:0.5px solid #ddd;border-radius:7px;background:#fafafa;outline:none;font-family:inherit}
input:focus,select:focus{border-color:#888;background:#fff}
label{display:block;font-size:12px;color:#888;margin-bottom:4px}
/* LOGS */
.log-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid #f5f5f3;font-size:12px}
.log-item:last-child{border-bottom:none}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ld-ok{background:#3B6D11}.ld-info{background:#185FA5}.ld-warn{background:#854F0B}.ld-error{background:#A32D2D}
.log-time{color:#aaa;font-size:11px;margin-left:auto;flex-shrink:0}
.empty{font-size:13px;color:#aaa;padding:8px 0}
.spinner{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-block;font-size:11px;padding:1px 8px;border-radius:10px;font-weight:500}
.badge-ok{background:#EAF3DE;color:#3B6D11}
.badge-warn{background:#FAEEDA;color:#854F0B}
.mt{margin-top:10px}
</style>
</head>
<body>

<div class="topbar">
  <i class="ti ti-brand-whatsapp" style="font-size:20px;color:#25D366" aria-hidden="true"></i>
  <h1>Bot Libros al Mayoreo</h1>
  <div id="status-dot" class="status-dot dot-warn"></div>
  <span id="status-txt" class="status-txt">Conectando...</span>
</div>

<div class="main">

  <!-- QR / Estado WA -->
  <div class="card" id="qr-card">
    <div class="card-head"><i class="ti ti-qrcode" aria-hidden="true"></i> WhatsApp</div>
    <div class="card-body">
      <div id="qr-area" class="qr-wrap">
        <div class="spinner" style="margin:2rem auto;display:block;width:28px;height:28px;border-width:3px"></div>
        <p>Iniciando...</p>
      </div>
    </div>
  </div>

  <!-- Cuentas bancarias -->
  <div class="card">
    <div class="card-head"><i class="ti ti-building-bank" aria-hidden="true"></i> Cuentas bancarias</div>
    <div class="card-body">
      <div id="cuentas-list"></div>
      <div class="mt">
        <div class="form-row">
          <div><label>Banco</label><input id="f-banco" placeholder="BBVA, Banamex..."></div>
          <div><label>Titular</label><input id="f-titular" placeholder="Nombre completo"></div>
        </div>
        <div class="form-row">
          <div><label>CLABE (18 dígitos)</label><input id="f-clabe" placeholder="000000000000000000" maxlength="18"></div>
          <div><label>Tarjeta (opcional)</label><input id="f-tarjeta" placeholder="16 dígitos" maxlength="16"></div>
        </div>
        <button class="btn btn-dark btn-sm" onclick="addCuenta()">
          <i class="ti ti-plus" aria-hidden="true"></i> Agregar cuenta
        </button>
      </div>
    </div>
  </div>

  <!-- Notas pendientes -->
  <div class="card full">
    <div class="card-head">
      <i class="ti ti-bell" aria-hidden="true"></i> Notas listas para enviar
      <span id="pendientes-badge" class="badge badge-warn" style="display:none">0</span>
    </div>
    <div class="card-body" id="pendientes-list">
      <p class="empty">No hay notas pendientes. Cuando llegue una nota al grupo aparece aquí.</p>
    </div>
  </div>

  <!-- Logs -->
  <div class="card full">
    <div class="card-head"><i class="ti ti-list" aria-hidden="true"></i> Actividad</div>
    <div class="card-body" id="logs-list">
      <p class="empty">Sin actividad aún.</p>
    </div>
  </div>

</div>

<script>
let cuentas = [];
let pendientes = [];

async function api(url, opts) {
  const r = await fetch(url, opts);
  return r.json();
}

// ── STATUS ────────────────────────────────────────────────────────────────────
async function refreshStatus() {
  const s = await api('/api/status');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  const qrArea = document.getElementById('qr-area');

  if (s.waReady) {
    dot.className = 'status-dot dot-ok';
    txt.textContent = 'WhatsApp conectado ✓';
    qrArea.innerHTML = `<div style="text-align:center;padding:1rem">
      <i class="ti ti-circle-check" style="font-size:48px;color:#3B6D11" aria-hidden="true"></i>
      <p style="margin-top:8px;font-size:13px;color:#3B6D11;font-weight:500">Conectado</p>
      ${s.groupId ? `<p style="font-size:12px;color:#888;margin-top:4px">Grupo activo</p>` : `<p style="font-size:12px;color:#854F0B;margin-top:4px">Esperando mensaje del grupo...</p>`}
    </div>`;
  } else if (s.qrDataUrl) {
    dot.className = 'status-dot dot-warn';
    txt.textContent = 'Escanea el QR con tu WhatsApp';
    qrArea.innerHTML = `<img src="${s.qrDataUrl}" alt="QR WhatsApp">
      <p>Abre WhatsApp → Dispositivos vinculados → Vincular dispositivo</p>`;
  } else {
    dot.className = 'status-dot dot-err';
    txt.textContent = 'Iniciando...';
    qrArea.innerHTML = `<div style="text-align:center;padding:1.5rem">
      <div class="spinner" style="margin:0 auto 8px;width:24px;height:24px;border-width:2px;border-top-color:#854F0B"></div>
      <p style="font-size:13px;color:#888">Iniciando WhatsApp...</p></div>`;
  }
}

// ── CUENTAS ───────────────────────────────────────────────────────────────────
async function refreshCuentas() {
  cuentas = await api('/api/cuentas');
  const el = document.getElementById('cuentas-list');
  if (!cuentas.length) { el.innerHTML = '<p class="empty">No hay cuentas. Agrega una abajo.</p>'; return; }
  el.innerHTML = cuentas.map(c => `
    <div class="cuenta-item">
      <div style="flex:1">
        <div class="cuenta-banco">${c.banco} — ${c.titular}</div>
        <div class="cuenta-clabe">CLABE: ${c.clabe}${c.tarjeta ? ' · T: ' + c.tarjeta : ''}</div>
      </div>
      <button class="btn btn-red btn-sm" onclick="deleteCuenta('${c.id}')">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>`).join('');
}

async function addCuenta() {
  const banco = document.getElementById('f-banco').value.trim();
  const titular = document.getElementById('f-titular').value.trim();
  const clabe = document.getElementById('f-clabe').value.trim();
  const tarjeta = document.getElementById('f-tarjeta').value.trim();
  if (!banco || !titular || !clabe) { alert('Banco, titular y CLABE son obligatorios'); return; }
  await api('/api/cuentas', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ banco, titular, clabe, tarjeta })
  });
  ['f-banco','f-titular','f-clabe','f-tarjeta'].forEach(id => document.getElementById(id).value = '');
  refreshCuentas();
  refreshPendientes();
}

async function deleteCuenta(id) {
  if (!confirm('¿Eliminar esta cuenta?')) return;
  await api('/api/cuentas/' + id, { method: 'DELETE' });
  refreshCuentas();
  refreshPendientes();
}

// ── PENDIENTES ────────────────────────────────────────────────────────────────
async function refreshPendientes() {
  pendientes = await api('/api/pendientes');
  cuentas = await api('/api/cuentas');
  const el = document.getElementById('pendientes-list');
  const badge = document.getElementById('pendientes-badge');

  if (!pendientes.length) {
    badge.style.display = 'none';
    el.innerHTML = '<p class="empty">No hay notas pendientes. Cuando llegue una nota al grupo aparece aquí.</p>';
    return;
  }

  badge.style.display = 'inline-block';
  badge.textContent = pendientes.length;

  el.innerHTML = pendientes.map(p => `
    <div class="pendiente" id="p-${p.id}">
      <div style="display:flex;align-items:center;gap:8px">
        <i class="ti ti-file-type-pdf" style="font-size:18px;color:#A32D2D" aria-hidden="true"></i>
        <div>
          <div class="p-nombre">${p.nombre}</div>
          <div class="p-meta">📱 ${p.tel} · ${new Date(p.timestamp).toLocaleTimeString('es-MX')}</div>
        </div>
      </div>
      <div class="p-total">${p.total}</div>
      ${p.desglose ? `<div style="font-size:12px;color:#888;margin-bottom:8px">${p.desglose}</div>` : ''}
      <label>Selecciona cuenta bancaria a usar:</label>
      <select id="sel-${p.id}">
        <option value="">— Elige una cuenta —</option>
        ${cuentas.map(c => `<option value="${c.id}">${c.banco} · ${c.titular} · CLABE: ...${c.clabe.slice(-4)}</option>`).join('')}
      </select>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-green" onclick="enviarNota('${p.id}')">
          <i class="ti ti-brand-whatsapp" aria-hidden="true"></i> Enviar al cliente
        </button>
      </div>
    </div>`).join('');
}

async function enviarNota(pendienteId) {
  const sel = document.getElementById('sel-' + pendienteId);
  if (!sel.value) { alert('Selecciona una cuenta bancaria primero'); return; }
  const btn = sel.parentElement.querySelector('.btn-green');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Enviando...';
  const res = await api('/api/enviar', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ pendienteId, cuentaId: sel.value })
  });
  if (res.ok) {
    document.getElementById('p-' + pendienteId)?.remove();
    refreshPendientes();
    refreshLogs();
  } else {
    alert('Error: ' + res.error);
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-brand-whatsapp"></i> Enviar al cliente';
  }
}

// ── LOGS ──────────────────────────────────────────────────────────────────────
async function refreshLogs() {
  const logs = await api('/api/logs');
  const el = document.getElementById('logs-list');
  if (!logs.length) { el.innerHTML = '<p class="empty">Sin actividad aún.</p>'; return; }
  el.innerHTML = logs.slice(0,30).map(l => `
    <div class="log-item">
      <div class="ld ld-${l.tipo}"></div>
      <span>${l.msg}</span>
      <span class="log-time">${l.time}</span>
    </div>`).join('');
}

// ── POLLING ───────────────────────────────────────────────────────────────────
function refresh() {
  refreshStatus();
  refreshPendientes();
  refreshLogs();
}

refreshCuentas();
refresh();
setInterval(refresh, 3000);
setInterval(refreshCuentas, 10000);
</script>
</body>
</html>
